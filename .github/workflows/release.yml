name: "Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      # Paso de verificación para asegurar que los motores de IA están en su sitio
      - name: verify sidecars
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/bin/whisper/whisper-cli-x86_64-pc-windows-msvc.exe") { echo "Whisper Sidecar found" } else { throw "Whisper Sidecar MISSING" }
          if (Test-Path "src-tauri/bin/llama/llama-cli-x86_64-pc-windows-msvc.exe") { echo "Llama Sidecar found" } else { throw "Llama Sidecar MISSING" }

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "NeuroScribe v__VERSION__"
          releaseBody: "Release oficial de NeuroScribe. Incluye instalador para Windows."
          releaseDraft: true
          prerelease: false
